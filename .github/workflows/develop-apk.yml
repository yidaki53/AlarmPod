name: Develop APK

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-develop-apk:
    name: Build develop PlayDebug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Configure parallel build
        run: echo "org.gradle.parallel=true" >> local.properties

      - name: Build PlayDebug APK
        run: ./gradlew assemblePlayDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-play-debug-${{ github.sha }}
          path: app/build/outputs/apk/play/debug/app-play-debug.apk
          if-no-files-found: error
